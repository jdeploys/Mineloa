name: record-macos-visual-baselines

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  record:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.12.0
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - name: Record complete native Darwin visual baselines
        run: npm run test:visual:update -- --reporter=line,html
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-visual-baselines-${{ github.sha }}
          path: |
            tests/visual/snapshots/darwin/**
            test-results/
            playwright-report/
          if-no-files-found: error
