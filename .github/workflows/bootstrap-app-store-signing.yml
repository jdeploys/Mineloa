name: bootstrap-app-store-signing

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create-signing-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.12.0
      - name: Generate private keys and CSRs
        run: |
          set -euo pipefail
          mkdir -p signing-assets
          openssl genrsa -out signing-assets/distribution.key 2048
          openssl req -new -key signing-assets/distribution.key -out signing-assets/distribution.csr -subj '/CN=Mineloa App Distribution'
          openssl genrsa -out signing-assets/installer.key 2048
          openssl req -new -key signing-assets/installer.key -out signing-assets/installer.csr -subj '/CN=Mineloa Installer Distribution'
      - name: Create certificates and provisioning profile
        env:
          ASC_API_PRIVATE_KEY: ${{ secrets.ASC_API_PRIVATE_KEY }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: node scripts/bootstrap-app-store-signing.mjs
      - name: Export password-protected signing identities
        env:
          P12_PASSWORD: ${{ secrets.MAS_BOOTSTRAP_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$P12_PASSWORD"
          openssl x509 -inform DER -in signing-assets/distribution.cer -out signing-assets/distribution.pem
          openssl x509 -inform DER -in signing-assets/installer.cer -out signing-assets/installer.pem
          openssl pkcs12 -export -inkey signing-assets/distribution.key -in signing-assets/distribution.pem -out signing-assets/distribution.p12 -passout env:P12_PASSWORD
          openssl pkcs12 -export -inkey signing-assets/installer.key -in signing-assets/installer.pem -out signing-assets/installer.p12 -passout env:P12_PASSWORD
          rm signing-assets/*.key signing-assets/*.csr signing-assets/*.pem signing-assets/*.cer
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mineloa-signing-assets
          path: signing-assets
          retention-days: 1
          if-no-files-found: error
