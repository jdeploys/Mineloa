name: rewrap-app-store-signing

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  rewrap-signing-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Download generated signing assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download 29635581786 --repo '${{ github.repository }}' --name mineloa-signing-assets --dir signing-assets
      - name: Rewrap signing identities with replacement password
        env:
          OLD_PASSWORD: ${{ secrets.MAS_BOOTSTRAP_PASSWORD }}
          NEW_PASSWORD: ${{ secrets.MAS_REWRAP_PASSWORD }}
        run: |
          set -euo pipefail
          openssl pkcs12 -in signing-assets/distribution.p12 -passin env:OLD_PASSWORD -nodes -out signing-assets/distribution.bundle.pem
          openssl pkcs12 -export -in signing-assets/distribution.bundle.pem -out signing-assets/distribution-new.p12 -passout env:NEW_PASSWORD
          openssl pkcs12 -in signing-assets/installer.p12 -passin env:OLD_PASSWORD -nodes -out signing-assets/installer.bundle.pem
          openssl pkcs12 -export -in signing-assets/installer.bundle.pem -out signing-assets/installer-new.p12 -passout env:NEW_PASSWORD
          rm signing-assets/distribution.p12 signing-assets/installer.p12 signing-assets/*.bundle.pem
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mineloa-signing-assets-rewrapped
          path: signing-assets
          retention-days: 1
          if-no-files-found: error
